<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Daftar Akun')}"></head>
<body class="auth-page">
    <div class="auth-card">
        <div class="auth-brand">
            <div class="logo">S</div>
            <h1>Buat Akun</h1>
            <p>Daftar untuk menggunakan SpaceBook</p>
        </div>

        <div th:replace="~{fragments/layout :: alerts}"></div>

        <form method="post" action="/register">
            <div class="form-group" style="margin-bottom:16px;">
                <label for="nama">Nama Lengkap</label>
                <input type="text" id="nama" name="nama" required placeholder="Nama lengkap">
            </div>
            <div class="form-group" style="margin-bottom:16px;">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="nama@email.com">
            </div>
            <div class="form-group" style="margin-bottom:16px;">
                <label for="role">Daftar sebagai</label>
                <select id="role" name="role" required>
                    <option value="mahasiswa">Mahasiswa</option>
                    <option value="petugas">Petugas</option>
                </select>
            </div>
            <div class="form-group" style="margin-bottom:16px;">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required minlength="4" placeholder="Min. 4 karakter">
            </div>
            <div class="form-group" style="margin-bottom:20px;">
                <label for="confirmPassword">Konfirmasi Password</label>
                <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Ulangi password">
            </div>
            <button type="submit" class="btn btn-primary btn-block">Daftar</button>
        </form>

        <p class="auth-footer">
            Sudah punya akun? <a href="/login">Masuk di sini</a>
        </p>
    </div>
</body>
</html>
