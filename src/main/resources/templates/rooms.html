<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Kelola Ruangan')}"></head>
<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>
    <div class="container">
        <a href="/" class="back-link">← Kembali ke Dashboard</a>
        <div class="page-header"><h1>Kelola Ruangan</h1><p>Data master ruangan co-working</p></div>
        <div th:replace="~{fragments/layout :: alerts}"></div>

        <div class="card">
            <h2 class="card-title" th:text="${editMode} ? 'Edit Ruangan' : 'Tambah Ruangan'"></h2>
            <form th:action="${editMode} ? @{/rooms/page/update/{id}(id=${roomForm.id})} : @{/rooms/page}"
                  method="post" th:object="${roomForm}">
                <div class="form-grid">
                    <div class="form-group"><label>Nama Ruangan</label><input type="text" th:field="*{namaRuangan}" required></div>
                    <div class="form-group"><label>Kapasitas</label><input type="number" th:field="*{kapasitas}" required min="1"></div>
                    <div class="form-group"><label>Status</label>
                        <select th:field="*{status}" required>
                            <option value="tersedia">Tersedia</option>
                            <option value="terisi">Terisi</option>
                            <option value="maintenance">Maintenance</option>
                        </select>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary" th:text="${editMode} ? 'Simpan' : 'Tambah'"></button>
                    <a th:if="${editMode}" href="/rooms/page" class="btn btn-secondary">Batal</a>
                </div>
            </form>
        </div>

        <p class="section-title">Daftar Ruangan</p>
        <div class="table-wrap">
            <table>
                <thead><tr><th>ID</th><th>Nama</th><th>Kapasitas</th><th>Status</th><th>Aksi</th></tr></thead>
                <tbody>
                    <tr th:each="room : ${rooms}">
                        <td th:text="${room.id}"></td>
                        <td th:text="${room.namaRuangan}"></td>
                        <td th:text="${room.kapasitas} + ' orang'"></td>
                        <td><span class="badge" th:classappend="${room.status == 'tersedia'} ? 'badge-tersedia' : (${room.status == 'terisi'} ? 'badge-terisi' : 'badge-maintenance')" th:text="${room.status}"></span></td>
                        <td><div class="actions">
                            <a th:href="@{/rooms/page/edit/{id}(id=${room.id})}" class="btn btn-warning btn-sm">Edit</a>
                            <form th:action="@{/rooms/page/delete/{id}(id=${room.id})}" method="post" style="display:inline;">
                                <button type="submit" class="btn btn-danger btn-sm" onclick="return confirm('Hapus ruangan?')">Hapus</button>
                            </form>
                        </div></td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(rooms)}" class="empty-row"><td colspan="5">Belum ada data ruangan.</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
