<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Daftar Ruangan - SpaceBook</title>
    <style>
        body  { font-family: Arial, sans-serif; max-width: 900px; margin: 40px auto; padding: 0 20px; }
        h1, h2 { color: #2c3e50; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th    { background: #27ae60; color: white; padding: 10px; text-align: left; }
        td    { padding: 8px 10px; border-bottom: 1px solid #ddd; }
        tr:hover td { background: #f0fff4; }
        .back { text-decoration: none; color: #27ae60; }
        .badge { padding: 2px 8px; border-radius: 10px; font-size: 12px; }
        .tersedia    { background: #2ecc71; color: white; }
        .terisi      { background: #e74c3c; color: white; }
        .maintenance { background: #f39c12; color: white; }
        .form-box { background: #f8f9fa; padding: 20px; border-radius: 8px; margin: 20px 0; border: 1px solid #ddd; }
        .form-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
        .form-row label { display: flex; flex-direction: column; font-size: 13px; color: #555; flex: 1; min-width: 150px; }
        .form-row input, .form-row select { padding: 8px; margin-top: 4px; border: 1px solid #ccc; border-radius: 4px; }
        .btn { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; text-decoration: none; display: inline-block; }
        .btn-primary { background: #27ae60; color: white; }
        .btn-warning { background: #f39c12; color: white; }
        .btn-danger  { background: #e74c3c; color: white; }
        .btn-secondary { background: #95a5a6; color: white; }
        .actions { display: flex; gap: 6px; }
    </style>
</head>
<body>
    <a class="back" href="/">← Kembali</a>
    <h1>🚪 Kelola Ruangan</h1>

    <div class="form-box">
        <h2 th:text="${editMode} ? '✏️ Edit Ruangan' : '➕ Tambah Ruangan'"></h2>
        <form th:action="${editMode} ? @{/rooms/page/update/{id}(id=${roomForm.id})} : @{/rooms/page}"
              method="post" th:object="${roomForm}">
            <div class="form-row">
                <label>Nama Ruangan
                    <input type="text" th:field="*{namaRuangan}" required placeholder="Meeting Room A">
                </label>
                <label>Kapasitas
                    <input type="number" th:field="*{kapasitas}" required min="1" placeholder="10">
                </label>
                <label>Status
                    <select th:field="*{status}" required>
                        <option value="">-- Pilih Status --</option>
                        <option value="tersedia">Tersedia</option>
                        <option value="terisi">Terisi</option>
                        <option value="maintenance">Maintenance</option>
                        <option value="AVAILABLE">Available</option>
                    </select>
                </label>
            </div>
            <button type="submit" class="btn btn-primary"
                    th:text="${editMode} ? 'Simpan Perubahan' : 'Tambah Ruangan'"></button>
            <a th:if="${editMode}" href="/rooms/page" class="btn btn-secondary">Batal</a>
        </form>
    </div>

    <h2>📋 Daftar Ruangan</h2>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Nama Ruangan</th>
                <th>Kapasitas</th>
                <th>Status</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="room : ${rooms}">
                <td th:text="${room.id}"></td>
                <td th:text="${room.namaRuangan}"></td>
                <td th:text="${room.kapasitas} + ' orang'"></td>
                <td>
                    <span th:text="${room.status}"
                          th:classappend="${room.status == 'tersedia' or room.status == 'AVAILABLE'} ? 'badge tersedia' :
                                          (${room.status == 'terisi'} ? 'badge terisi' : 'badge maintenance')">
                    </span>
                </td>
                <td>
                    <div class="actions">
                        <a th:href="@{/rooms/page/edit/{id}(id=${room.id})}" class="btn btn-warning">Edit</a>
                        <form th:action="@{/rooms/page/delete/{id}(id=${room.id})}" method="post" style="display:inline;">
                            <button type="submit" class="btn btn-danger"
                                    onclick="return confirm('Hapus ruangan ini?')">Hapus</button>
                        </form>
                    </div>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(rooms)}">
                <td colspan="5" style="text-align:center; color:#999;">Belum ada data ruangan.</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
