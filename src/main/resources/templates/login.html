<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Login')}"></head>
<body class="auth-page">
    <div class="auth-card">
        <div class="auth-brand">
            <div class="logo">S</div>
            <h1>SpaceBook</h1>
            <p>Sistem Reservasi Co-Working Space</p>
        </div>

        <div th:replace="~{fragments/layout :: alerts}"></div>

        <form method="post" action="/login">
            <div class="form-group" style="margin-bottom:16px;">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="nama@email.com">
            </div>
            <div class="form-group" style="margin-bottom:20px;">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary btn-block">Masuk</button>
        </form>

        <p class="auth-footer">
            Belum punya akun? <a href="/register">Daftar sekarang</a>
        </p>

        <div class="demo-box">
            <center><strong>Akun demo</strong></center>
            Admin = admin@spacebook.com / admin123<br>
            Mahasiswa = mahasiswa@spacebook.com / mhs123<br>
            Petugas = petugas@spacebook.com / petugas123
        </div>
    </div>
</body>
</html>
