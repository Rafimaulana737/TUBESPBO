<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Daftar User - SpaceBook</title>
    <style>
        body  { font-family: Arial, sans-serif; max-width: 900px; margin: 40px auto; padding: 0 20px; }
        h1, h2 { color: #2c3e50; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th    { background: #3498db; color: white; padding: 10px; text-align: left; }
        td    { padding: 8px 10px; border-bottom: 1px solid #ddd; }
        tr:hover td { background: #f0f8ff; }
        .back { text-decoration: none; color: #3498db; }
        .badge { padding: 2px 8px; border-radius: 10px; font-size: 12px; }
        .admin { background: #e74c3c; color: white; }
        .user  { background: #2ecc71; color: white; }
        .form-box { background: #f8f9fa; padding: 20px; border-radius: 8px; margin: 20px 0; border: 1px solid #ddd; }
        .form-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
        .form-row label { display: flex; flex-direction: column; font-size: 13px; color: #555; flex: 1; min-width: 150px; }
        .form-row input, .form-row select { padding: 8px; margin-top: 4px; border: 1px solid #ccc; border-radius: 4px; }
        .btn { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; text-decoration: none; display: inline-block; }
        .btn-primary { background: #3498db; color: white; }
        .btn-warning { background: #f39c12; color: white; }
        .btn-danger  { background: #e74c3c; color: white; }
        .btn-secondary { background: #95a5a6; color: white; }
        .actions { display: flex; gap: 6px; }
    </style>
</head>
<body>
    <a class="back" href="/">← Kembali</a>
    <h1>👤 Kelola User</h1>

    <div class="form-box">
        <h2 th:text="${editMode} ? '✏️ Edit User' : '➕ Tambah User'"></h2>
        <form th:action="${editMode} ? @{/user/page/update/{id}(id=${userForm.id})} : @{/user/page}"
              method="post" th:object="${userForm}">
            <div class="form-row">
                <label>Nama
                    <input type="text" th:field="*{nama}" required placeholder="Nama lengkap">
                </label>
                <label>Email
                    <input type="email" th:field="*{email}" required placeholder="email@example.com">
                </label>
                <label>Password
                    <input type="password" th:field="*{password}" required placeholder="Password">
                </label>
                <label>Role
                    <select th:field="*{role}" required>
                        <option value="">-- Pilih Role --</option>
                        <option value="admin">Admin</option>
                        <option value="user">User</option>
                        <option value="Mahasiswa">Mahasiswa</option>
                    </select>
                </label>
            </div>
            <button type="submit" class="btn btn-primary"
                    th:text="${editMode} ? 'Simpan Perubahan' : 'Tambah User'"></button>
            <a th:if="${editMode}" href="/user/page" class="btn btn-secondary">Batal</a>
        </form>
    </div>

    <h2>📋 Daftar User</h2>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Nama</th>
                <th>Email</th>
                <th>Role</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="user : ${users}">
                <td th:text="${user.id}"></td>
                <td th:text="${user.nama}"></td>
                <td th:text="${user.email}"></td>
                <td>
                    <span th:text="${user.role}"
                          th:classappend="${user.role == 'admin'} ? 'badge admin' : 'badge user'">
                    </span>
                </td>
                <td>
                    <div class="actions">
                        <a th:href="@{/user/page/edit/{id}(id=${user.id})}" class="btn btn-warning">Edit</a>
                        <form th:action="@{/user/page/delete/{id}(id=${user.id})}" method="post" style="display:inline;">
                            <button type="submit" class="btn btn-danger"
                                    onclick="return confirm('Hapus user ini?')">Hapus</button>
                        </form>
                    </div>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(users)}">
                <td colspan="5" style="text-align:center; color:#999;">Belum ada data user.</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
