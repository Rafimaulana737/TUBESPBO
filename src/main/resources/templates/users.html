<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Kelola User')}"></head>
<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>
    <div class="container">
        <a href="/" class="back-link">← Kembali ke Dashboard</a>
        <div class="page-header"><h1>Kelola User</h1><p>Manajemen akun pengguna sistem</p></div>
        <div th:replace="~{fragments/layout :: alerts}"></div>

        <div class="card">
            <h2 class="card-title" th:text="${editMode} ? 'Edit User' : 'Tambah User'"></h2>
            <form th:action="${editMode} ? @{/user/page/update/{id}(id=${userForm.id})} : @{/user/page}"
                  method="post" th:object="${userForm}">
                <div class="form-grid">
                    <div class="form-group"><label>Nama</label><input type="text" th:field="*{nama}" required></div>
                    <div class="form-group"><label>Email</label><input type="email" th:field="*{email}" required></div>
                    <div class="form-group"><label>Password</label><input type="password" th:field="*{password}" required></div>
                    <div class="form-group"><label>Role</label>
                        <select th:field="*{role}" required>
                            <option value="admin">Admin</option>
                            <option value="mahasiswa">Mahasiswa</option>
                            <option value="petugas">Petugas</option>
                        </select>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary" th:text="${editMode} ? 'Simpan' : 'Tambah'"></button>
                    <a th:if="${editMode}" href="/user/page" class="btn btn-secondary">Batal</a>
                </div>
            </form>
        </div>

        <p class="section-title">Daftar User</p>
        <div class="table-wrap">
            <table>
                <thead><tr><th>ID</th><th>Nama</th><th>Email</th><th>Role</th><th>Aksi</th></tr></thead>
                <tbody>
                    <tr th:each="user : ${users}">
                        <td th:text="${user.id}"></td>
                        <td th:text="${user.nama}"></td>
                        <td th:text="${user.email}"></td>
                        <td><span class="badge" th:classappend="${#strings.equalsIgnoreCase(user.role,'admin')} ? 'badge-admin' : (${#strings.equalsIgnoreCase(user.role,'petugas')} ? 'badge-petugas' : 'badge-mahasiswa')" th:text="${user.role}"></span></td>
                        <td><div class="actions">
                            <a th:href="@{/user/page/edit/{id}(id=${user.id})}" class="btn btn-warning btn-sm">Edit</a>
                            <form th:action="@{/user/page/delete/{id}(id=${user.id})}" method="post" style="display:inline;">
                                <button type="submit" class="btn btn-danger btn-sm" onclick="return confirm('Hapus user?')">Hapus</button>
                            </form>
                        </div></td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(users)}" class="empty-row"><td colspan="5">Belum ada data user.</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
