<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Data Reservation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h1>Data Reservation</h1>

    <table class="table table-bordered">
        <thead>
            <tr>
                <th>ID</th>
                <th>Tanggal</th>
                <th>User</th>
                <th>Ruangan</th>
            </tr>
        </thead>

        <tbody>
            <tr th:each="r : ${reservations}">
                <td th:text="${r.id}"></td>
                <td th:text="${r.tanggal}"></td>
                <td th:text="${r.user.nama}"></td>
                <td th:text="${r.room.namaRuangan}"></td>
            </tr>
        </tbody>

    </table>

    <a href="/" class="btn btn-secondary">Kembali</a>

</div>

</body>
</html>
