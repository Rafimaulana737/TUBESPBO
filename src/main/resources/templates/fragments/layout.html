<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' · SpaceBook'">SpaceBook</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>

<nav th:fragment="navbar" class="navbar">
    <a href="/" class="navbar-brand">
        <span>S</span> SpaceBook
    </a>
    <div class="navbar-user" th:if="${session.currentUser != null}">
        <span th:text="${session.currentUser.nama}">User</span>
        <span class="role-badge" th:text="${session.currentUser.role}">role</span>
        <a href="/logout" class="btn btn-ghost btn-sm">Logout</a>
    </div>
</nav>

<div th:fragment="alerts">
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
</div>

</body>
</html>
