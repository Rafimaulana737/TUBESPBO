<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Reservasi')}"></head>
<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>
    <div class="container">
        <a href="/" class="back-link">← Kembali ke Dashboard</a>
        <div class="page-header"><h1>Semua Reservasi</h1><p>Kelola transaksi booking (Admin)</p></div>
        <div th:replace="~{fragments/layout :: alerts}"></div>

        <div class="card">
            <h2 class="card-title" th:text="${editMode} ? 'Edit Reservasi' : 'Tambah Reservasi'"></h2>
            <form th:action="${editMode} ? @{/reservations/page/update/{id}(id=${reservationForm.id})} : @{/reservations/page}" method="post">
                <div class="form-grid">
                    <div class="form-group"><label>Tanggal</label><input type="date" name="tanggal" required th:value="${reservationForm.tanggal}"></div>
                    <div class="form-group"><label>User</label>
                        <select name="userId" required>
                            <option th:each="u : ${users}" th:value="${u.id}" th:text="${u.nama}"
                                    th:selected="${reservationForm.user != null and reservationForm.user.id == u.id}"></option>
                        </select>
                    </div>
                    <div class="form-group"><label>Meja</label>
                        <select name="mejaId" required>
                            <option th:each="m : ${mejaList}" th:value="${m.id}"
                                    th:text="${m.nomorMeja} + ' · ' + (${m.room != null} ? ${m.room.namaRuangan} : '-')"
                                    th:selected="${reservationForm.meja != null and reservationForm.meja.id == m.id}"></option>
                        </select>
                    </div>
                    <div class="form-group" th:if="${editMode}"><label>Status</label>
                        <select name="status">
                            <option value="MENUNGGU" th:selected="${reservationForm.status == 'MENUNGGU'}">MENUNGGU</option>
                            <option value="CHECK_IN" th:selected="${reservationForm.status == 'CHECK_IN'}">CHECK_IN</option>
                            <option value="SELESAI" th:selected="${reservationForm.status == 'SELESAI'}">SELESAI</option>
                            <option value="DIBATALKAN" th:selected="${reservationForm.status == 'DIBATALKAN'}">DIBATALKAN</option>
                        </select>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary" th:text="${editMode} ? 'Simpan' : 'Tambah'"></button>
                    <a th:if="${editMode}" href="/reservations/page" class="btn btn-secondary">Batal</a>
                </div>
            </form>
        </div>

        <p class="section-title">Daftar Reservasi</p>
        <div class="table-wrap">
            <table>
                <thead><tr><th>Kode</th><th>Tanggal</th><th>User</th><th>Meja</th><th>Ruangan</th><th>Status</th><th>Aksi</th></tr></thead>
                <tbody>
                    <tr th:each="res : ${reservations}">
                        <td th:text="${res.bookingKode}"></td>
                        <td th:text="${res.tanggal}"></td>
                        <td th:text="${res.user != null} ? ${res.user.nama} : '-'"></td>
                        <td th:text="${res.meja != null} ? ${res.meja.nomorMeja} : '-'"></td>
                        <td th:text="${res.room != null} ? ${res.room.namaRuangan} : '-'"></td>
                        <td><span class="badge badge-status" th:text="${res.status}"></span></td>
                        <td><div class="actions">
                            <a th:href="@{/reservations/page/edit/{id}(id=${res.id})}" class="btn btn-warning btn-sm">Edit</a>
                            <form th:action="@{/reservations/page/delete/{id}(id=${res.id})}" method="post" style="display:inline;">
                                <button type="submit" class="btn btn-danger btn-sm" onclick="return confirm('Hapus?')">Hapus</button>
                            </form>
                        </div></td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(reservations)}" class="empty-row"><td colspan="7">Belum ada reservasi.</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
